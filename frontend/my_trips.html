<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="myTripsTitle">SkyPlan - Chuyến đi của tôi</title>

  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="favicon.ico" type="image/x-icon">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="assets/styles/reset.css">
  <link rel="stylesheet" href="assets/styles/index.css">
  <link rel="stylesheet" href="assets/styles/header.css">
  <link rel="stylesheet" href="assets/styles/wallet.css">
  <link rel="stylesheet" href="assets/styles/flags.css">
  <link rel="stylesheet" href="assets/styles/footer.css">
  <link rel="stylesheet" href="assets/styles/my_trips.css">
</head>
<body>
  <div id="header-container"></div>

  <main class="my-trips-page">
    <div class="main-content">
      <div class="page-header">
        <h1 data-i18n="myTripsPageTitle">Chuyến đi của tôi</h1>
        <p data-i18n="myTripsSubtitle">Quản lý và theo dõi các chuyến đi của bạn</p>
      </div>

      <div class="trips-tabs">
        <button class="tab-btn active" data-status="all">
          <i class="fas fa-list"></i>
          <span data-i18n="allTrips">Tất cả</span>
        </button>
        <button class="tab-btn" data-status="upcoming">
          <i class="fas fa-clock"></i>
          <span data-i18n="upcomingTrips">Sắp tới</span>
        </button>
        <button class="tab-btn" data-status="completed">
          <i class="fas fa-check-circle"></i>
          <span data-i18n="completedTrips">Hoàn tất</span>
        </button>
        <button class="tab-btn" data-status="cancelled">
          <i class="fas fa-times-circle"></i>
          <span data-i18n="cancelledTrips">Đã hủy</span>
        </button>
      </div>

      <div class="trips-content">
        <div class="tab-content active" id="all-content">
          <div class="trips-list"></div>
        </div>

        <div class="tab-content" id="upcoming-content">
          <div class="trips-list"></div>
        </div>

        <div class="tab-content" id="completed-content">
          <div class="trips-list"></div>
        </div>

        <div class="tab-content" id="cancelled-content">
          <div class="trips-list"></div>
        </div>

        <div class="empty-state" id="empty-state" style="display: none;">
          <div class="empty-icon">
            <i class="fas fa-plane-slash"></i>
          </div>
          <h3 data-i18n="noTripsTitle">Chưa có chuyến đi nào</h3>
          <p data-i18n="noTripsMessage">Bạn chưa có chuyến đi nào trong danh mục này. Hãy đặt chuyến bay đầu tiên!</p>
          <button class="btn btn-primary" onclick="window.location.href='index.html'">
            <i class="fas fa-search"></i>
            <span data-i18n="searchFlights">Tìm chuyến bay</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="assets/scripts/toast.js"></script>
  <script src="assets/scripts/common.js"></script>
  <script src="assets/scripts/auth-utils.js"></script>
  <script src="assets/scripts/wallet_translations.js"></script>
  <script src="assets/scripts/metamask.js"></script>
  <script src="assets/scripts/wallet-ui.js"></script>
  <script src="assets/scripts/my_trips_translations.js"></script>
  <script src="assets/scripts/my_trips.js"></script>

  <script>
    function initializeLanguage() {
      var currentLang = (localStorage.getItem('language') || localStorage.getItem('preferredLanguage') || 'vi').toLowerCase();
      currentLang = currentLang === 'en' ? 'en' : 'vi';

      if (typeof window.broadcastLanguageChange === 'function') {
        window.broadcastLanguageChange(currentLang);
      } else {
        localStorage.setItem('preferredLanguage', currentLang);
        localStorage.setItem('language', currentLang);
        document.documentElement.lang = currentLang;
      }

      if (typeof applyMyTripsTranslations === 'function') {
        applyMyTripsTranslations(currentLang);
      }
      if (typeof updateSelectedLanguage === 'function') {
        updateSelectedLanguage(currentLang);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      function handleComponentError(componentName) {
        console.error('Failed to load ' + componentName + ' component');
      }

      fetch('components/header.html')
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.text();
        })
        .then(function(data) {
          document.getElementById('header-container').innerHTML = data;
          requestAnimationFrame(function() {
            if (typeof initializeMobileMenu === 'function') initializeMobileMenu();
            if (typeof initializeLanguageSelector === 'function') initializeLanguageSelector();
            if (typeof initWalletUI === 'function') initWalletUI();
            if (typeof updateHeaderUserInfo === 'function') updateHeaderUserInfo();
            document.dispatchEvent(new CustomEvent('header-loaded'));
            initializeLanguage();
          });
        })
        .catch(function() {
          handleComponentError('header');
          initializeLanguage();
        });

      fetch('components/footer.html')
        .then(function(response) {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.text();
        })
        .then(function(data) {
          document.getElementById('footer-container').innerHTML = data;
          if (typeof applyMyTripsTranslations === 'function') {
            var lang = (localStorage.getItem('language') || localStorage.getItem('preferredLanguage') || 'vi').toLowerCase() === 'en' ? 'en' : 'vi';
            applyMyTripsTranslations(lang);
          }
        })
        .catch(function() {
          handleComponentError('footer');
        });
    });
  </script>
</body>
</html>
